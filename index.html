<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Árvore de Decisões</title>
<style>
  :root {
    --bg: #f8fafc; --card: #ffffff; --fg: #0f172a; --muted: #64748b;
    --border: #e2e8f0; --primary: #2563eb; --primary-fg: #ffffff;
    --primary-soft: #eff6ff;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0b1220; --card:#111827; --fg:#f1f5f9; --muted:#94a3b8;
      --border:#1f2937; --primary:#60a5fa; --primary-fg:#0b1220; --primary-soft:#172033; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.5; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 64px; display:flex; flex-direction:column; align-items:center; }
  h1 { font-size: 20px; margin: 0 0 4px; align-self:flex-start; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; align-self:flex-start; }
  .step { width:100%; max-width:480px; background: var(--card); border:1px solid var(--border); border-radius: 16px;
    padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); animation: pop .25s ease-out; }
  .step.faded { opacity:.8; }
  .step.active { border-color: color-mix(in srgb, var(--primary) 50%, transparent);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 8%, transparent); }
  .qrow { display:flex; gap:12px; align-items:flex-start; margin-bottom:14px; }
  .num { width:26px; height:26px; flex:none; border-radius:999px; background: var(--primary-soft);
    color: var(--primary); font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; }
  .q { font-size: 16px; font-weight: 500; margin: 2px 0 0; white-space: pre-wrap; word-break: break-word; line-height:1.4; }
  .answers { display:flex; flex-direction:column; gap:8px; }
  .a { display:flex; gap:8px; align-items:flex-start; text-align:left; width:100%;
    border:1px solid var(--border); background: var(--card); color: var(--fg);
    border-radius: 12px; padding: 10px 14px; font-size: 14px; cursor: pointer; transition: all .15s; font: inherit; line-height:1.4; }
  .a:hover { transform: translateY(-1px); border-color: var(--primary); color: var(--primary);
    background: var(--primary-soft); box-shadow: 0 4px 12px -4px color-mix(in srgb, var(--primary) 40%, transparent); }
  .a.chosen { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
  .a.chosen:hover { background: var(--primary); color: var(--primary-fg); }
  .a.dim { opacity:.5; }
  .a .dot { width:14px; height:14px; flex:none; margin-top:3px; border-radius:999px; border:1.5px solid currentColor; opacity:.4; }
  .a.chosen .dot { background: currentColor; opacity:1; border-color: currentColor; position:relative; }
  .a.chosen .dot::after { content:""; position:absolute; left:3px; top:1px; width:4px; height:7px;
    border:solid var(--primary); border-width:0 2px 2px 0; transform: rotate(45deg); }
  .a .lbl { flex:1; white-space:pre-wrap; word-break:break-word; }
  .cont { align-self:center; display:inline-flex; align-items:center; gap:4px;
    border:1px solid var(--primary); background: var(--primary); color: var(--primary-fg);
    border-radius: 999px; padding: 9px 20px; font-size: 14px; font-weight:500; cursor:pointer; transition: all .15s; font: inherit; }
  .cont:hover { transform: translateY(-1px); box-shadow: 0 4px 12px -4px color-mix(in srgb, var(--primary) 50%, transparent); }
  .hint { margin-top:10px; text-align:center; font-size:11px; color:var(--muted); }

  /* Tree arrows */
  .edge { display:flex; flex-direction:column; align-items:center; max-width:320px; animation: pop .25s ease-out; }
  .edge .line { width:2px; height:20px; background: color-mix(in srgb, var(--primary) 50%, transparent); }
  .edge .pill { max-width:100%; border:1px solid color-mix(in srgb, var(--primary) 30%, transparent);
    background: var(--primary-soft); color: var(--primary); border-radius: 14px;
    padding: 4px 12px; font-size: 12px; font-weight: 500; text-align:center;
    white-space: pre-wrap; word-break: break-word; line-height:1.35; }
  .edge .arrow { width:14px; height:20px; color: color-mix(in srgb, var(--primary) 60%, transparent); }

  .end { margin-top: 0; padding: 8px 18px; border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--primary) 40%, transparent);
    background: color-mix(in srgb, var(--primary) 12%, transparent);
    color: var(--primary); font-size: 14px; font-weight: 500; animation: pop .25s ease-out; }
  .restart { margin-top: 28px; background:none; border:1px solid var(--border);
    color: var(--muted); border-radius:8px; padding: 6px 12px; font: inherit; font-size: 13px; cursor:pointer; }
  .restart:hover { color: var(--fg); }
  .empty { text-align:center; color:var(--muted); padding: 40px; border:1px dashed var(--border); border-radius:12px; }
  @keyframes pop { from { opacity:0; transform: translateY(-6px) scale(.98);} to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Árvore de Decisões</h1>
  <p class="sub">Clique em uma resposta para continuar.</p>
  <div id="root" style="display:flex;flex-direction:column;align-items:center;width:100%"></div>
</div>
<script>
  const STATE = {"nodes":{"kdtx71yg":{"id":"kdtx71yg","question":"Betânia conhece João pela internet e inicia um relacionamento. Eles passam a morar com a mãe de João. Desde o início, ela percebe que há um certo nível de ciúmes desmedido por parte dele, porém, ele diz que a ama e que é apenas um sinal de cuidado. Betânia descobre que está grávida. Como Betânia deve reagir?","x":0,"y":0,"answers":[{"id":"jawrjktw","label":"Conversar seriamente com ele sobre a sua atitude, para que isso não interfira no relacionamento deles. Afinal, ela está grávida e precisa confiar no atual companheiro.","nextNodeId":"12936pt3"},{"id":"drok51wk","label":"Conversar com familiares e construir uma rede de apoio desde o início. Porém, correr o risco de haver uma desavença entre eles e criar um problema maior, já que a sua família não gosta muito dele e a mãe de João já teve algumas desavenças sérias com Betânia.","nextNodeId":"ce9kwlzc"}]},"12936pt3":{"id":"12936pt3","question":"Betânia continua o relacionamento, mas sofre a  primeira agressão durante a gravidez. João pede desculpas e diz que a ama. O que ela deve fazer?","x":0,"y":0,"answers":[{"id":"ysvo79xx","label":"Registrar boletim de ocorrência","nextNodeId":"gxsi39bd"},{"id":"441cjjen","label":"Conversar com familiares e construir uma rede de apoio, mas dar um voto de confiança a João, afinal, está grávida e não tem para onde ir (a sua família mora em Pernambuco). Apesar de tudo, ela ainda é apaixonada por João.","nextNodeId":"91qlu746"}]},"gxsi39bd":{"id":"gxsi39bd","question":"Após ser agredida, Betânia procura atendimento médico e registra BO, porém, não se afasta de João. Ela relata agressões físicas, humilhações, ameaças e controle por parte do companheiro. Apesar de acreditar em mudanças, a violência persiste e se intensifica com o uso de álcool e drogas por João. O que fazer?","x":0,"y":0,"answers":[{"id":"rb7agw1y","label":"Ela decide registrar boletim de ocorrência. Contudo, desiste de realizar o B.O, já que o agente público realizou um comentário colocando em cheque seu sofrimento. ","nextNodeId":"kvfk7cuf"},{"id":"hqwtd98f","label":"Aguardar novos acontecimentos e concentrar esforços apenas na preservação das provas, já que não tem para onde ir e quer proteger o filho.","nextNodeId":"lhv20ygy"}]},"91qlu746":{"id":"91qlu746","question":"Betânia decide não formalizar denúncia. Ela acredita que o nascimento do filho, Leonardo, poderá mudar o comportamento dele.","x":0,"y":0,"answers":[{"id":"bl3d5wy7","label":"Buscar apoio da mãe e de familiares próximos, apesar dos julgamentos que irá receber e do fato de a família morar em Pernambuco.","nextNodeId":null},{"id":"tbyjh18g","label":"Tentar resolver os conflitos dentro do relacionamento, afinal, está grávida e precisa do apoio do pai da criança.","nextNodeId":"2goej58g"}]},"2goej58g":{"id":"2goej58g","question":"O filho nasce. Após se recusar a dar dinheiro para comprar drogas, Betânia é perseguida por João com um pedaço de madeira. Ela foge e aciona a polícia para resgatar o filho que permaneceu na residência do agressor. Com apoio policial, a criança é localizada e ambos passam a noite na casa de vizinhos.","x":0,"y":0,"answers":[{"id":"s7jy6lnj","label":"Betânia deve procurar assistência jurídica, viajar para Pernambuco, permanecer junto à sua rede familiar e registrar todos os fatos ocorridos. Ela deve abandonar João.","nextNodeId":"cnt5xb7w"},{"id":"7022l13z","label":"Betânia deve procurar assistência jurídica. e abandonar João, mas permanecer em Ribeirão Preto e buscar imediatamente medidas protetivas judiciais para que possa reconstruir sua vida ao lado do filho, mesmo sendo ameaçada de morte e sem lugar para morar.","nextNodeId":"8ckcz9zh"}]},"cnt5xb7w":{"id":"cnt5xb7w","question":"Betânia está protegida junto à mãe, porém, passa por sérias dificuldades financeiras. João foi atrás dela em Pernambuco, pediu desculpas e disse estar arrependido. Ele pede para que ela volte para Ribeirão Preto, pois deseja reatar o relacionamento e cuidar do filho","x":0,"y":0,"answers":[{"id":"s5vo58tz","label":"Continuar em Pernambuco com a família, longe de João, e reconstruir a sua vida por lá, mesmo que esteja com dificuldades financeiras e sob o risco de perder a guarda do filho.","nextNodeId":"qvllvo56"},{"id":"oraf2khi","label":"Tentar reconstruir a vida em Ribeirão Preto e formar uma família com João. Se ela der mais uma chance, ele pode ser um bom pai para seu filho e ajudar na criação da criança.","nextNodeId":"8hsifjja"}]},"8ckcz9zh":{"id":"8ckcz9zh","question":"Betânia permanece na cidade. Ela consegue ajuizar medidas protetivas mais rapidamente, mas continua próxima do agressor e sem uma rede familiar estruturada. Algumas semanas depois, relata que passa a ter medo de sair sozinha e acredita estar sendo observada.","x":0,"y":0,"answers":[{"id":"8yypnh0q","label":"Acionar CRAS, CREAS e atendimento psicológico.","nextNodeId":"vtee977e"},{"id":"yx5ef5ud","label":"Concentrar toda a estratégia apenas nos processos judiciais e o esforço para cuidar do filho pequeno.","nextNodeId":"x4ysk51m"}]},"vtee977e":{"id":"vtee977e","question":"Ela procura ajuda, mas o atendimento demora. Além disso, está passando por dificuldades financeiras e João aciona o Conselho Tutelar, pedindo a guarda do filho. Betânia acaba jogando uma sandália no filho e o acerta no olho, sem querer, Com isso, perde a guarda da criança e é obrigada a pagar alimentos. Ela, então, procura a Defensoria Pública para se defender. Ela está muito mal psicologicamente.","x":0,"y":0,"answers":[{"id":"qw40pfcw","label":"Betânia deve insistir na busca por atendimento psicológico e lutar pela guarda do filho, mesmo diante das ameaças de morte feitas por João.","nextNodeId":"mwrw34mj"},{"id":"i41k6jqa","label":"Betânia deve voltar para Pernambuco e desistir de lutar pela guarda do filho, por medo de João, que a ameaçou de morte e proibiu contato/visitas à criança.","nextNodeId":"a2h95ovn"}]},"x4ysk51m":{"id":"x4ysk51m","question":"Betânia passa por dificuldades financeiras, acaba se descontrolando e batendo no filho pequeno com um chinelo. João pede a guarda da criança e proíbe visitar por parte da mãe, ameaçando-a de morte constantemente. Ela fica com muito medo e teme por sua vida.","x":0,"y":0,"answers":[{"id":"rplbakwy","label":"Betânia desiste do filho e volta para Pernambuco para morar com sua mãe e tentar reconstruir a vida.","nextNodeId":null},{"id":"3ab7zsmo","label":"Betânia procura a assistência judicial para ajudá-la a recuperar a guarda da criança e a se defender da ação de alimentos instaurada por João.","nextNodeId":"ln34atrm"}]},"ce9kwlzc":{"id":"ce9kwlzc","question":"Betânia decide não formalizar denúncia. Ela acredita que o nascimento do filho poderá mudar o comportamento dele. Nos meses seguintes, o relacionamento continua marcado por episódios de violência psicológica. João destrói documentos do bebê e faz ameaças quando está sob efeito de álcool e drogas.","x":0,"y":0,"answers":[{"id":"exo5fbl2","label":"Buscar apoio da mãe e de familiares próximos, que moram em Pernambuco.","nextNodeId":"2mjslwxe"},{"id":"i0f9hr5m","label":"Permanece em Ribeirão Preto, tentando resolver os conflitos dentro do relacionamento, pois tem medo do comportamento de João se ela o denunciar e não quer abandonar a sua vida na cidade que cresceu por conta dele.","nextNodeId":"kncq1mus"}]},"2mjslwxe":{"id":"2mjslwxe","question":"Betânia está protegida junto à mãe, porém, passa por sérias dificuldades financeiras, correndo o risco de perder a guarda do filho. João foi atrás dela em Pernambuco, pediu desculpas e disse estar arrependido. Ele pede para que ela volte para Ribeirão Preto, pois deseja reatar o relacionamento e cuidar do filho e dela. Ele insiste em voltar com ela e promete que irá mudar, dizendo sentir falta dela e querer conhecer o filho que nasceu.","x":0,"y":0,"answers":[{"id":"263fk14c","label":"João a agride novamente, dessa vez um pouco mais forte, e faz ameaças graves. Dessa vez, ela procura a defensoria e pede ajuda.","nextNodeId":"8ckcz9zh"}]},"kncq1mus":{"id":"kncq1mus","question":"João a agride novamente, dessa vez um pouco mais forte, e faz ameaças graves. Dessa vez, ela procura a defensoria e pede ajuda.","x":0,"y":0,"answers":[{"id":"v4kvakhw","label":"Betânia procura assistência jurídica.  Abandona João, mas decide permanecer em Ribeirão Preto e buscar imediatamente medidas protetivas judiciais para que possa reconstruir sua vida ao lado do filho.","nextNodeId":"kmt6n6h1"}]},"kmt6n6h1":{"id":"kmt6n6h1","question":"Betânia permanece na cidade. Ela consegue ajuizar medidas protetivas mais rapidamente, mas continua próxima do agressor e sem uma rede familiar estruturada. Algumas semanas depois, relata que passa a ter medo de sair sozinha e acredita estar sendo observada.","x":0,"y":0,"answers":[]},"8hsifjja":{"id":"8hsifjja","question":"Betânia decide dar uma nova chance a João, volta a morar com ele e com o filho. João a acolhe e paga todas as suas despesas, mas deixa claro que ela não pode trabalhar e terá que cuidar da casa e do filho. Betânia abandona a sua profissão e passa a depender 100% de João para o seu sustento. Pelo menos, está com o filho, permaneceu na cidade em que nasceu e não mora na rua, pensa consigo mesma.","x":0,"y":0,"answers":[]},"qvllvo56":{"id":"qvllvo56","question":"Betânia precisa trabalhar para cuidar do filho e não tem com quem deixar a criança. João entra com pedido de guarda e a acusa de negligência. Ele ganha a causa. Betânia fica em Pernambuco, mas o filho volta para Ribeirão Preto, com o pai.","x":0,"y":0,"answers":[]},"kvfk7cuf":{"id":"kvfk7cuf","question":"Anos se passaram, ela sofreu muita violência, mas se manteve perto do filho. Depois de muito tempo, ela cria coragem novamente, busca ajuda do Pastor da igreja local do bairro, o qual a ajuda a denunciar João, e consegue uma oferta financeira para que Betânia venha reconstruir a vida distante dali, em outra cidade. Ela deve aceitar a proposta?","x":0,"y":0,"answers":[{"id":"7g4zbl4u","label":"Sim","nextNodeId":"w47afoge"},{"id":"ee40r3ma","label":"Não","nextNodeId":"ormjww54"}]},"lhv20ygy":{"id":"lhv20ygy","question":"Infelizmente, o próxima briga que ocorreu gerou uma fatalidade, em um momento de descontrole, sob uso de entorpecentes João assassina Betânia com 7 facadas.","x":0,"y":0,"answers":[]},"mwrw34mj":{"id":"mwrw34mj","question":"Ela inicia segmento com o psiquiatra, com psicólogo e demais possibilidades de rede de apoio, está esperançosa pois o próximo passo certamente será reconectar-se com seu filho Leo.","x":0,"y":0,"answers":[]},"ln34atrm":{"id":"ln34atrm","question":"Ela consegue regularizar tanto o pedido de alimentos in natura quanto o regime de visitas, retomando o contato com Leo.","x":0,"y":0,"answers":[]},"a2h95ovn":{"id":"a2h95ovn","question":"Betânia desiste do filho e volta para Pernambuco para morar com sua mãe e tentar reconstruir a vida. Ela não vê mais a criança.","x":0,"y":0,"answers":[]},"ormjww54":{"id":"ormjww54","question":"Betânia não aceita, pois quer continuar morando em Ribeirão, onde tem trabalho e amigos. Ela consegue ajuizar medidas protetivas mais rapidamente, mas continua próxima do agressor e sem uma rede familiar estruturada. Algumas semanas depois, relata que passa a ter medo de sair sozinha e acredita estar sendo observada.","x":0,"y":0,"answers":[]},"w47afoge":{"id":"w47afoge","question":"Betânia aceita e reconstrói a sua vida em outra cidade. Porém, precisa usar um nome diferente e se esconder para o resto da vida, pois João a ameaçou de morte quando descobriu que ela o deixou e levou o filho. João entra com pedido de guarda da criança e Betânia corre o risco de não poder mais ver o filho, se a polícia a encontrar.","x":0,"y":0,"answers":[]}},"rootId":"kdtx71yg"};
  const root = document.getElementById("root");
  let path = STATE.rootId ? [{ nodeId: STATE.rootId }] : [];

  function makeEdge(label) {
    const e = document.createElement("div"); e.className = "edge";
    const l1 = document.createElement("div"); l1.className = "line"; e.appendChild(l1);
    if (label) {
      const p = document.createElement("div"); p.className = "pill"; p.textContent = label; e.appendChild(p);
    }
    const arrow = document.createElementNS("http://www.w3.org/2000/svg","svg");
    arrow.setAttribute("class","arrow"); arrow.setAttribute("viewBox","0 0 14 20");
    arrow.innerHTML = '<line x1="7" y1="0" x2="7" y2="14" stroke="currentColor" stroke-width="2"/><polyline points="1,12 7,19 13,12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    e.appendChild(arrow);
    return e;
  }

  function render() {
    root.innerHTML = "";
    if (!path.length) { root.innerHTML = '<div class="empty">Nenhum bloco definido.</div>'; return; }

    path.forEach((step, idx) => {
      const node = STATE.nodes[step.nodeId];
      if (!node) return;
      const isLast = idx === path.length - 1;
      const answered = !!step.chosenAnswerId;

      if (idx > 0) root.appendChild(makeEdge(path[idx - 1].chosenLabel || ""));

      const step$ = document.createElement("div");
      step$.className = "step " + (isLast ? "active" : "faded");

      const qrow = document.createElement("div"); qrow.className = "qrow";
      const num = document.createElement("div"); num.className = "num"; num.textContent = String(idx + 1);
      const q = document.createElement("p"); q.className = "q"; q.textContent = node.question;
      qrow.appendChild(num); qrow.appendChild(q);
      step$.appendChild(qrow);

      const ans = document.createElement("div"); ans.className = "answers";
      if (!node.answers.length) {
        if (node.transitionNextId && STATE.nodes[node.transitionNextId]) {
          const b = document.createElement("button");
          b.className = "cont" + (answered ? " chosen" : "");
          b.innerHTML = 'Continuar <span style="margin-left:4px">→</span>';
          b.onclick = () => {
            path = path.slice(0, idx + 1);
            path[idx] = Object.assign({}, path[idx], { chosenAnswerId: "__t__", chosenLabel: "" });
            path.push({ nodeId: node.transitionNextId });
            render();
          };
          ans.appendChild(b);
        } else {
          const em = document.createElement("span");
          em.style.color = "var(--muted)"; em.style.fontStyle = "italic"; em.style.fontSize = "14px";
          em.textContent = "— bloco final —"; ans.appendChild(em);
        }
      }
      node.answers.forEach((a) => {
        const b = document.createElement("button");
        const chosen = step.chosenAnswerId === a.id;
        b.className = "a" + (chosen ? " chosen" : answered ? " dim" : "");
        const dot = document.createElement("span"); dot.className = "dot";
        const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = a.label;
        b.appendChild(dot); b.appendChild(lbl);
        b.onclick = () => {
          path = path.slice(0, idx + 1);
          path[idx] = Object.assign({}, path[idx], { chosenAnswerId: a.id, chosenLabel: a.label });
          if (a.nextNodeId && STATE.nodes[a.nextNodeId]) path.push({ nodeId: a.nextNodeId });
          render();
        };
        ans.appendChild(b);
      });
      step$.appendChild(ans);
      if (answered && !isLast && node.answers.length > 0) {
        const hint = document.createElement("div"); hint.className = "hint";
        hint.textContent = "Clique em outra resposta para alterar o fluxo";
        step$.appendChild(hint);
      }
      root.appendChild(step$);

      if (answered && isLast) {
        let terminal = false;
        if (step.chosenAnswerId === "__t__") {
          terminal = !node.transitionNextId || !STATE.nodes[node.transitionNextId];
        } else {
          const chosen = node.answers.find((a) => a.id === step.chosenAnswerId);
          terminal = !chosen || !chosen.nextNodeId || !STATE.nodes[chosen.nextNodeId];
        }
        if (terminal) {
          if (step.chosenLabel) root.appendChild(makeEdge(step.chosenLabel));
          const end = document.createElement("div"); end.className = "end";
          end.textContent = "✓ Fim do caminho"; root.appendChild(end);
        }
      }
    });

    if (path.length > 1) {
      const r = document.createElement("button");
      r.className = "restart"; r.textContent = "↺ Recomeçar";
      r.onclick = () => { path = [{ nodeId: STATE.rootId }]; render(); };
      root.appendChild(r);
    }
  }
  render();
</script>
</body>
</html>
